# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.14.2"
  go_min: "1.25.3"
  go_mod: github.com/errata-ai/vale
  go_build: go build -v --buildmode=pie -trimpath -modcacherw -ldflags "-s -w -X main.version=${{ version }}"
  go_bin: ${{ "$PREFIX/bin/$PKG_NAME" if unix else "%PREFIX%\\bin\\%PKG_NAME%.exe" }}
  go_mod_xz: github.com/xi2/xz
  go_mod_ts_julia: github.com/jdkato/go-tree-sitter-julia/julia
  license_ignore: ${{ go_mod_xz }} ${{ go_mod_ts_julia }} ${{ go_mod }}
  var_src_dir: ${{ "$SRC_DIR" if unix else "%SRC_DIR%" }}
  var_conda_prefix: ${{ "$CONDA_PREFIX" if unix else "%CONDA_PREFIX%" }}
  mkdir: ${{ "mkdir -p" if unix else "md" }}
  grep: ${{ "grep -iE " if unix else "findstr /c:" }}
  ls: ${{ "ls -lathr" if unix else "dir" }}
  slash: ${{ "/" if unix else "\\" }}

recipe:
  name: vale
  version: ${{ version }}

source:
  - url: https://${{ go_mod }}/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 7141b3602568cc000b191661a7866bdbd0192123df79e6f0faaab21eebe98071
    target_directory: src/${{ go_mod }}
    patches:
      - 0000-use-conda-prefix.patch
  - url: https://raw.githubusercontent.com/xi2/xz/refs/heads/master/LICENSE
    sha256: 5c640056d513f276d56635af7a0bed81cb7eac02a31b6e56d40c416557a8d8ce
    target_directory: license-files-manual/${{ go_mod_xz }}

build:
  number: 0

outputs:
  - package:
      name: vale
    build:
      script:
        env:
          GOPATH: ${{ var_src_dir }}
        content:
          - cd "src/${{ go_mod }}"
          - ${{ go_build }} -o "${{ go_bin }}" ./cmd/vale
          - ${{ ls }} "${{ go_bin }}"
          - |-
            go-licenses save ./cmd/vale --save_path "${{ var_src_dir }}/license-files"
              {%- for i in license_ignore | split %} --ignore=${{ i }}{% endfor %}
          - ${{ ls }} "${{ var_src_dir }}/license-files"

    requirements:
      build:
        - ${{ compiler("go-cgo") }}
        - go-licenses
        - go >=${{ go_min }}
        - if: unix
          then:
            - ${{ compiler("c") }}
            - ${{ compiler("cxx") }}
            - ${{ stdlib("c") }}
          else:
            - ${{ compiler("m2w64_c") }}
            - ${{ compiler("m2w64_cxx") }}
            - ${{ stdlib("m2w64_c") }}

    tests:
      - script:
          - vale --version
          - vale --help
          - vale --version | ${{ grep }}"${{ version | replace(".", "\\.") }}"
          - vale ls-dirs
          - ${{ mkdir }} "${{ var_conda_prefix }}/share/vale/styles"
          - vale ls-dirs
          - vale ls-dirs | ${{ grep }}"${{ var_conda_prefix }}${{ slash }}share"
          - ${{ mkdir }} "${{ var_conda_prefix }}/etc/vale"
          - echo "" > "${{ var_conda_prefix }}/etc/vale/.vale.ini"
          - vale ls-dirs
          - vale ls-dirs | ${{ grep }}"${{ var_conda_prefix }}${{ slash }}etc"

about:
  license: MIT
  license_file:
    - src/${{ go_mod }}/LICENSE
    - license-files/
    - license-files-manual/
  summary: A syntax-aware linter for prose built with speed and extensibility in mind.
  homepage: https://vale.sh
  repository: https://${{ go_mod }}
  documentation: https://vale.sh/docs

extra:
  feedstock-name: vale
  recipe-maintainers:
    - bollwyvl
